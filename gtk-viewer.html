<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GTK File Viewer — Zund Cutting</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0d0f14;
    --surface: #151820;
    --surface2: #1c2030;
    --border: #252b3b;
    --accent: #00e5ff;
    --accent2: #ff3d6b;
    --text: #e4e8f0;
    --muted: #5a6480;
    --panel-w: 270px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* TOP BAR */
  header {
    display: flex; align-items: center; gap: 12px;
    padding: 0 16px; height: 50px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0; z-index: 10;
  }
  .logo {
    font-family: 'Space Mono', monospace; font-size: 13px; font-weight: 700;
    letter-spacing: .12em; color: var(--accent); text-transform: uppercase; white-space: nowrap;
  }
  .logo span { color: var(--muted); }
  .file-tabs { display: flex; gap: 4px; flex: 1; overflow-x: auto; }
  .file-tab {
    display: flex; align-items: center; gap: 7px;
    padding: 5px 12px; border-radius: 6px; cursor: pointer;
    font-family: 'Space Mono', monospace; font-size: 11px;
    color: var(--muted); border: 1px solid transparent;
    white-space: nowrap; transition: all .15s; user-select: none;
  }
  .file-tab:hover { background: var(--surface2); color: var(--text); }
  .file-tab.active { background: var(--surface2); border-color: var(--accent); color: var(--accent); }
  .file-tab .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); opacity: .6; }
  .file-tab.active .dot { opacity: 1; box-shadow: 0 0 6px var(--accent); }
  .hdr-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 13px; background: transparent;
    border: 1px solid var(--border); border-radius: 6px;
    color: var(--muted); cursor: pointer; font-size: 12px;
    font-family: 'DM Sans', sans-serif; transition: all .15s; white-space: nowrap;
  }
  .hdr-btn:hover { border-color: var(--accent); color: var(--accent); }
  .hdr-btn.save:hover { border-color: #a8ff78; color: #a8ff78; }
  .hdr-btn svg { width: 14px; height: 14px; }
  .hdr-btn:disabled { opacity: .3; cursor: default; pointer-events: none; }

  /* LAYOUT */
  .main { display: flex; flex: 1; overflow: hidden; }

  /* PANEL */
  .panel {
    width: var(--panel-w); background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0;
  }
  .panel-body { flex: 1; overflow-y: auto; overflow-x: hidden; }
  .panel-body::-webkit-scrollbar { width: 4px; }
  .panel-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .panel-section { border-bottom: 1px solid var(--border); }
  .panel-title {
    font-family: 'Space Mono', monospace; font-size: 10px;
    letter-spacing: .1em; color: var(--muted);
    padding: 10px 14px 8px; text-transform: uppercase;
    display: flex; align-items: center; justify-content: space-between;
  }

  /* LAYERS */
  .layer-item {
    display: flex; align-items: center; gap: 9px;
    padding: 6px 14px; cursor: pointer; transition: background .1s; user-select: none;
  }
  .layer-item:hover { background: var(--surface2); }
  .layer-item.hidden { opacity: .35; }
  .layer-swatch { width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0; border: 1px solid rgba(255,255,255,.1); }
  .layer-name { flex: 1; font-size: 12px; }
  .layer-count { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted); }
  .eye-icon { width: 13px; height: 13px; color: var(--muted); flex-shrink: 0; }

  /* INFO */
  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; padding: 0 0 6px; }
  .info-cell { padding: 7px 14px; }
  .info-label { font-size: 10px; color: var(--muted); margin-bottom: 2px; letter-spacing: .05em; }
  .info-value { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--text); }

  /* OPTIONS */
  .opt-row { display: flex; align-items: center; gap: 8px; padding: 8px 14px; }
  .opt-label { font-size: 12px; color: var(--text); flex: 1; white-space: nowrap; }
  .toggle-track {
    width: 28px; height: 15px; background: var(--border);
    border-radius: 8px; position: relative; transition: background .2s;
    flex-shrink: 0; cursor: pointer;
  }
  .toggle-track.on { background: var(--accent); }
  .toggle-thumb {
    position: absolute; top: 2px; left: 2px;
    width: 11px; height: 11px; background: #fff;
    border-radius: 50%; transition: left .18s;
  }
  .toggle-track.on .toggle-thumb { left: 15px; }
  .slider-row {
    display: flex; align-items: center; gap: 8px;
    padding: 4px 14px 10px;
  }
  .slider-row label { font-size: 11px; color: var(--muted); white-space: nowrap; }
  .slider-row input[type=range] {
    -webkit-appearance: none; flex: 1; height: 3px;
    background: var(--border); border-radius: 2px; outline: none; cursor: pointer;
  }
  .slider-row input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 14px; height: 14px;
    border-radius: 50%; background: var(--accent); cursor: pointer;
    box-shadow: 0 0 6px rgba(0,229,255,.4);
  }
  .slider-val {
    font-family: 'Space Mono', monospace; font-size: 11px;
    color: var(--accent); width: 26px; text-align: right; flex-shrink: 0;
  }

  /* SHAPES */
  .shape-item {
    display: flex; align-items: center; gap: 6px;
    padding: 4px 14px;
    border-bottom: 1px solid rgba(37,43,59,.5);
    transition: background .1s;
  }
  .shape-item:hover { background: var(--surface2); }
  .shape-idx {
    font-family: 'Space Mono', monospace; font-size: 9px;
    color: var(--muted); width: 18px; flex-shrink: 0; text-align: right;
  }
  .shape-name-input {
    flex: 1; background: transparent;
    border: 1px solid transparent; border-radius: 4px;
    color: var(--text); font-family: 'Space Mono', monospace;
    font-size: 11px; padding: 3px 6px; outline: none;
    transition: border-color .15s, background .15s; min-width: 0;
  }
  .shape-name-input:hover { border-color: var(--border); }
  .shape-name-input:focus { border-color: var(--accent); background: var(--surface2); color: var(--accent); }
  .shape-name-input.dirty { color: #a8ff78; }
  .locate-btn {
    width: 22px; height: 22px; background: transparent;
    border: 1px solid transparent; border-radius: 4px;
    color: var(--muted); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all .12s;
  }
  .locate-btn:hover { border-color: var(--accent); color: var(--accent); }
  .locate-btn svg { width: 12px; height: 12px; }

  /* ZOOM */
  .zoom-controls {
    display: flex; align-items: center; gap: 6px;
    padding: 10px 14px; border-top: 1px solid var(--border); flex-shrink: 0;
  }
  .zoom-btn {
    width: 26px; height: 26px; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 5px;
    color: var(--text); cursor: pointer; font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: all .1s; flex-shrink: 0;
  }
  .zoom-btn:hover { border-color: var(--accent); color: var(--accent); }
  .zoom-level {
    font-family: 'Space Mono', monospace; font-size: 11px;
    color: var(--muted); flex: 1; text-align: center;
  }
  .fit-btn {
    padding: 0 9px; height: 26px; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 5px;
    color: var(--muted); cursor: pointer; font-size: 11px;
    font-family: 'DM Sans', sans-serif; transition: all .1s; white-space: nowrap;
  }
  .fit-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* CANVAS */
  .canvas-wrap {
    flex: 1; position: relative; overflow: hidden;
    background: radial-gradient(ellipse at 20% 20%, rgba(0,229,255,.04) 0%, transparent 60%), var(--bg);
    cursor: grab;
  }
  .canvas-wrap:active { cursor: grabbing; }
  .canvas-wrap::before {
    content: ''; position: absolute; inset: 0;
    background-image: radial-gradient(circle, rgba(255,255,255,.07) 1px, transparent 1px);
    background-size: 28px 28px; pointer-events: none;
  }
  canvas { position: absolute; top: 0; left: 0; }
  .coords {
    position: absolute; bottom: 14px; right: 16px;
    font-family: 'Space Mono', monospace; font-size: 10px;
    color: var(--muted); background: rgba(13,15,20,.7);
    padding: 4px 10px; border-radius: 4px; border: 1px solid var(--border);
    pointer-events: none; letter-spacing: .05em;
  }
  .empty-state {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 16px; pointer-events: none;
  }
  .empty-state.hidden { display: none; }
  .empty-icon {
    width: 60px; height: 60px; border: 2px dashed var(--border); border-radius: 12px;
    display: flex; align-items: center; justify-content: center; color: var(--muted);
  }
  .empty-state p { color: var(--muted); font-size: 13px; }
  .empty-state strong { color: var(--text); }
  #fileInput { display: none; }
  .loading-bar {
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transform-origin: left; transform: scaleX(0); transition: transform .3s; z-index: 20;
  }
  .loading-bar.active { transform: scaleX(1); }

  /* BRANDING */
  #tb-brand {
    display: flex; align-items: center; gap: 10px;
    position: absolute; bottom: 14px; left: 16px;
    text-decoration: none; background: rgba(13,15,20,.82);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 7px 12px 7px 8px; z-index: 20;
    transition: border-color .18s, background .18s;
    backdrop-filter: blur(6px);
  }
  #tb-brand:hover { border-color: var(--accent); background: rgba(21,24,32,.95); }
  .tb-brand-avatar { width: 30px; height: 30px; border-radius: 50%; overflow: hidden; flex-shrink: 0; border: 1.5px solid var(--accent); }
  .tb-brand-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
  #tb-brand-text { display: flex; flex-direction: column; gap: 1px; }
  .tb-name { font-size: 11px; font-weight: 600; color: var(--text); white-space: nowrap; }
  .tb-role { font-size: 9px; color: var(--muted); font-family: 'Space Mono', monospace; letter-spacing: .04em; white-space: nowrap; }

  @keyframes flashAnim { 0%,100%{opacity:1} 40%{opacity:.15} }
  .do-flash { animation: flashAnim .55s ease 2; }
</style>
</head>
<body>

<div class="loading-bar" id="loadingBar"></div>

<header>
  <div class="logo">GTK<span>/</span>View</div>
  <div class="file-tabs" id="fileTabs"></div>
  <button class="hdr-btn" onclick="document.getElementById('fileInput').click()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
      <polyline points="17 8 12 3 7 8"/>
      <line x1="12" y1="3" x2="12" y2="15"/>
    </svg>
    Open GTK
  </button>
  <button class="hdr-btn save" id="saveBtn" onclick="saveGTK()" disabled>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/>
      <polyline points="17 21 17 13 7 13 7 21"/>
      <polyline points="7 3 7 8 15 8"/>
    </svg>
    Save GTK
  </button>
  <input type="file" id="fileInput" accept=".gtk" multiple>
</header>

<div class="main">
  <div class="panel">
    <div class="panel-body">

      <div class="panel-section">
        <div class="panel-title">Layers</div>
        <div id="layerList"></div>
      </div>

      <div class="panel-section">
        <div class="panel-title">File Info</div>
        <div class="info-grid">
          <div class="info-cell"><div class="info-label">WIDTH</div><div class="info-value" id="iW">—</div></div>
          <div class="info-cell"><div class="info-label">HEIGHT</div><div class="info-value" id="iH">—</div></div>
          <div class="info-cell"><div class="info-label">PATHS</div><div class="info-value" id="iP">—</div></div>
          <div class="info-cell"><div class="info-label">GROUPS</div><div class="info-value" id="iG">—</div></div>
          <div class="info-cell" style="grid-column:1/-1">
            <div class="info-label">FILENAME</div>
            <div class="info-value" id="iFN" style="font-size:10px;word-break:break-all">—</div>
          </div>
        </div>
      </div>

      <div class="panel-section">
        <div class="panel-title">Options</div>
        <div class="opt-row">
          <span class="opt-label">Shape names</span>
          <div class="toggle-track on" id="labelTrack" onclick="toggleLabels()"><div class="toggle-thumb"></div></div>
        </div>
        <div class="slider-row">
          <label>Text size</label>
          <input type="range" id="textSizeSlider" min="4" max="80" value="14" oninput="onTextSize(this.value)">
          <span class="slider-val" id="sliderVal">14</span>
        </div>
      </div>

      <div class="panel-section">
        <div class="panel-title">
          <span>Shapes</span>
          <span id="dirtyBadge" style="display:none;font-size:9px;color:#a8ff78;font-family:'Space Mono',monospace">● unsaved</span>
        </div>
        <div id="shapeList"></div>
      </div>

    </div>

    <div class="zoom-controls">
      <button class="zoom-btn" id="zoomOut">−</button>
      <div class="zoom-level" id="zoomLevel">100%</div>
      <button class="zoom-btn" id="zoomIn">+</button>
      <button class="fit-btn" id="fitBtn">Fit</button>
    </div>
  </div>

  <div class="canvas-wrap" id="canvasWrap">
    <canvas id="mainCanvas"></canvas>
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
        </svg>
      </div>
      <p><strong>Drop a .gtk file here</strong></p>
      <p>or click <strong>Open GTK</strong> above</p>
    </div>
    <div class="coords" id="coords">x: 0.00 &nbsp; y: 0.00</div>
    <a id="tb-brand" href="https://www.linkedin.com/in/brahimbenchakroun/" target="_blank" rel="noopener" title="Brahim Ben Chakroun — LinkedIn">
      <div class="tb-brand-avatar"><img src="https://media.licdn.com/dms/image/v2/D4E03AQFCuuurvdLqZA/profile-displayphoto-shrink_800_800/profile-displayphoto-shrink_800_800/0/1728899865907?e=1775088000&v=beta&t=k8JGkdryya3alo3Y3kNYy6N7NqyC0OEp5OVvPv32fUk" alt=""></div>
      <div id="tb-brand-text"><span class="tb-name">Brahim Ben Chakroun</span><span class="tb-role">Made by · LinkedIn ↗</span></div>
    </a>
  </div>
</div>

<script>
// ════════════════════════════════════
//  PARSER
// ════════════════════════════════════
function parseGTK(xmlText) {
  const doc = new DOMParser().parseFromString(xmlText, 'text/xml');

  const namedLayers = {};
  doc.querySelectorAll('named_layer').forEach(nl => {
    const id = +nl.getAttribute('layer');
    const le = nl.querySelector('line');
    namedLayers[id] = {
      name: nl.getAttribute('name'), layer: id,
      color: `rgb(${le?.getAttribute('r')||0},${le?.getAttribute('g')||0},${le?.getAttribute('b')||0})`,
    };
  });

  const groups = [];
  doc.querySelectorAll('shapegroup').forEach((sg, idx) => {
    const groupLayer = +(sg.getAttribute('layer') ?? 0);
    const gmat = sg.children[0]?.tagName === 'matrix' ? parseMat(sg.children[0]) : null;

    let shapeName = '';
    const tl = sg.querySelector('textline');
    if (tl) {
      shapeName = [...tl.querySelectorAll('glyphinfo')]
        .map(g => { const c = +g.getAttribute('char'); return c > 31 && c < 127 ? String.fromCharCode(c) : ''; })
        .join('').trim();
    }

    const outlines = [];
    sg.querySelectorAll('outline').forEach(ol => {
      outlines.push({ layer: +(ol.getAttribute('layer') ?? groupLayer), segments: parseOutline(ol) });
    });

    groups.push({ layer: groupLayer, matrix: gmat, outlines, shapeName, originalName: shapeName, sgIdx: idx });
  });

  return { namedLayers, groups, rawXml: xmlText };
}

function parseMat(el) {
  return { x1:+el.getAttribute('x1'), y1:+el.getAttribute('y1'), x2:+el.getAttribute('x2'), y2:+el.getAttribute('y2'), xt:+el.getAttribute('xt'), yt:+el.getAttribute('yt') };
}

function parseOutline(ol) {
  const segs = []; let cur = {x:0,y:0}; let pend = null;
  for (const el of ol.children) {
    const tag = el.tagName, x = +el.getAttribute('x'), y = +el.getAttribute('y');
    if (tag==='m')  { cur={x,y}; segs.push({type:'move',x,y}); pend=null; }
    else if (tag==='l') { segs.push({type:'line',x1:cur.x,y1:cur.y,x2:x,y2:y}); cur={x,y}; pend=null; }
    else if (tag==='b1') { pend={b1x:x,b1y:y}; }
    else if (tag==='b2') { if(pend){pend.b2x=x;pend.b2y=y;} }
    else if (tag==='b3') { if(pend){segs.push({type:'bezier',x1:cur.x,y1:cur.y,cp1x:pend.b1x,cp1y:pend.b1y,cp2x:pend.b2x,cp2y:pend.b2y,x2:x,y2:y});cur={x,y};pend=null;} }
    else if (tag==='a1') { pend={a1x:x,a1y:y}; }
    else if (tag==='a2') { if(pend?.a1x!==undefined){segs.push({type:'arc',x1:cur.x,y1:cur.y,cpx:pend.a1x,cpy:pend.a1y,x2:x,y2:y});cur={x,y};pend=null;} }
  }
  return segs;
}

// ════════════════════════════════════
//  SERIALISER  — write edits back to GTK XML
// ════════════════════════════════════
function serializeGTK(file) {
  const doc = new DOMParser().parseFromString(file.data.rawXml, 'text/xml');
  const sgs = [...doc.querySelectorAll('shapegroup')];

  file.data.groups.forEach((g, i) => {
    const sg = sgs[i];
    if (!sg) return;
    const newName = g.shapeName;

    let tl = sg.querySelector('textline');
    if (!tl) {
      // create a minimal textline before the first outline
      tl = doc.createElement('textline');
      tl.setAttribute('layer','7');
      tl.setAttribute('glyphheight','13.00');
      const m = doc.createElement('matrix');
      m.setAttribute('x1','1'); m.setAttribute('y1','0');
      m.setAttribute('x2','0'); m.setAttribute('y2','1');
      m.setAttribute('xt','0'); m.setAttribute('yt','0');
      tl.appendChild(m);
      const firstOutline = sg.querySelector('outline');
      sg.insertBefore(tl, firstOutline || null);
    }

    // Remove old glyphs
    [...tl.querySelectorAll('glyphinfo')].forEach(g => g.remove());

    // Write new glyphs — one per character, with running x offset
    let xOff = 0;
    for (const ch of newName) {
      const gi = doc.createElement('glyphinfo');
      gi.setAttribute('x1','13.00'); gi.setAttribute('y1','0.00');
      gi.setAttribute('x2','0.00');  gi.setAttribute('y2','13.00');
      gi.setAttribute('xt', xOff.toFixed(2)); gi.setAttribute('yt','0.00');
      gi.setAttribute('char', String(ch.charCodeAt(0)));
      gi.setAttribute('font','STANDARD.FNT');
      tl.appendChild(gi);
      xOff += 7.5;   // approx. advance width in GTK units
    }
  });

  let out = new XMLSerializer().serializeToString(doc);
  // Strip the XML declaration — GTK files don't use one
  out = out.replace(/^<\?xml[^?]*\?>\s*/, '');
  return out;
}

// ════════════════════════════════════
//  MATH
// ════════════════════════════════════
function applyMat(m, x, y) {
  return { x: m.x1*x + m.x2*y + m.xt, y: m.y1*x + m.y2*y + m.yt };
}

function computeBounds(groups) {
  let [mnX,mnY,mxX,mxY] = [Infinity,Infinity,-Infinity,-Infinity];
  const touch = (x,y) => { if(x<mnX)mnX=x;if(x>mxX)mxX=x;if(y<mnY)mnY=y;if(y>mxY)mxY=y; };
  groups.forEach(g => g.outlines.forEach(ol => ol.segments.forEach(s => {
    const tr = (x,y) => g.matrix ? applyMat(g.matrix,x,y) : {x,y};
    if(s.type==='move') { const p=tr(s.x,s.y); touch(p.x,p.y); }
    else if(s.type==='line') { [tr(s.x1,s.y1),tr(s.x2,s.y2)].forEach(p=>touch(p.x,p.y)); }
    else if(s.type==='bezier') { [tr(s.x1,s.y1),tr(s.cp1x,s.cp1y),tr(s.cp2x,s.cp2y),tr(s.x2,s.y2)].forEach(p=>touch(p.x,p.y)); }
    else if(s.type==='arc')  { [tr(s.x1,s.y1),tr(s.cpx,s.cpy),tr(s.x2,s.y2)].forEach(p=>touch(p.x,p.y)); }
  })));
  return { minX:mnX, minY:mnY, maxX:mxX, maxY:mxY, w:mxX-mnX, h:mxY-mnY };
}

// ════════════════════════════════════
//  STATE
// ════════════════════════════════════
const state = {
  files: [], activeIdx: -1,
  zoom: 1, panX: 0, panY: 0,
  hiddenLayers: new Set(),
  showLabels: true,
  labelBasePx: 14,
};

const canvas = document.getElementById('mainCanvas');
const ctx    = canvas.getContext('2d');
const wrap   = document.getElementById('canvasWrap');
const empty  = document.getElementById('emptyState');

// ════════════════════════════════════
//  RENDER
// ════════════════════════════════════
function resize() { canvas.width = wrap.clientWidth; canvas.height = wrap.clientHeight; render(); }

function render() {
  const { activeIdx, files, zoom, panX, panY, hiddenLayers, showLabels, labelBasePx } = state;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (activeIdx < 0 || !files[activeIdx]) return;

  const { data, bounds } = files[activeIdx];
  const { groups, namedLayers } = data;

  // World → canvas (Y-flipped)
  const tc = (wx, wy) => ({
    x: (wx - bounds.minX) * zoom + panX,
    y: (bounds.maxY - (wy - bounds.minY)) * zoom + panY,
  });

  // ── Pass 1: outlines (always 1 px) ──
  groups.forEach(g => {
    g.outlines.forEach(ol => {
      if (hiddenLayers.has(ol.layer)) return;
      let color = namedLayers[ol.layer]?.color ?? '#ffffff';
      if (color === 'rgb(0,0,0)') color = '#e4e8f0';

      ctx.beginPath();
      ctx.strokeStyle = color;
      ctx.lineWidth   = 1;
      ctx.lineJoin    = 'round';
      ctx.lineCap     = 'round';

      const tr = (x, y) => { const p = g.matrix ? applyMat(g.matrix,x,y) : {x,y}; return tc(p.x,p.y); };
      let moved = false;

      ol.segments.forEach(s => {
        if (s.type==='move') {
          const p=tr(s.x,s.y); ctx.moveTo(p.x,p.y); moved=true;
        } else if (s.type==='line') {
          if (!moved){const p=tr(s.x1,s.y1);ctx.moveTo(p.x,p.y);moved=true;}
          const p=tr(s.x2,s.y2); ctx.lineTo(p.x,p.y);
        } else if (s.type==='bezier') {
          if (!moved){const p=tr(s.x1,s.y1);ctx.moveTo(p.x,p.y);moved=true;}
          const c1=tr(s.cp1x,s.cp1y),c2=tr(s.cp2x,s.cp2y),ep=tr(s.x2,s.y2);
          ctx.bezierCurveTo(c1.x,c1.y,c2.x,c2.y,ep.x,ep.y);
        } else if (s.type==='arc') {
          if (!moved){const p=tr(s.x1,s.y1);ctx.moveTo(p.x,p.y);moved=true;}
          const cp=tr(s.cpx,s.cpy),ep=tr(s.x2,s.y2);
          ctx.quadraticCurveTo(cp.x,cp.y,ep.x,ep.y);
        }
      });
      ctx.stroke();
    });
  });

  // ── Pass 2: labels (scale with zoom, fit inside bbox) ──
  if (!showLabels) return;
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';

  groups.forEach(g => {
    if (!g.shapeName) return;

    let [mnX,mnY,mxX,mxY] = [Infinity,Infinity,-Infinity,-Infinity];
    const tr = (x, y) => { const p = g.matrix ? applyMat(g.matrix,x,y) : {x,y}; return tc(p.x,p.y); };

    g.outlines.forEach(ol => {
      if (hiddenLayers.has(ol.layer)) return;
      ol.segments.forEach(s => {
        const pts = [];
        if (s.type==='move')   pts.push(tr(s.x,s.y));
        else if (s.type==='line')   pts.push(tr(s.x1,s.y1),tr(s.x2,s.y2));
        else if (s.type==='bezier') pts.push(tr(s.x1,s.y1),tr(s.cp1x,s.cp1y),tr(s.cp2x,s.cp2y),tr(s.x2,s.y2));
        else if (s.type==='arc')    pts.push(tr(s.x1,s.y1),tr(s.cpx,s.cpy),tr(s.x2,s.y2));
        pts.forEach(p=>{if(p.x<mnX)mnX=p.x;if(p.x>mxX)mxX=p.x;if(p.y<mnY)mnY=p.y;if(p.y>mxY)mxY=p.y;});
      });
    });
    if (!isFinite(mnX)) return;

    const bW = mxX-mnX, bH = mxY-mnY;
    if (bW < 8 || bH < 8) return;
    if (mxX<0||mnX>canvas.width||mxY<0||mnY>canvas.height) return;

    const cx=(mnX+mxX)/2, cy=(mnY+mxY)/2;
    const label = g.shapeName;

    // Start at user-defined base size × zoom
    let fp = labelBasePx * zoom;
    ctx.font = `${fp}px "Space Mono",monospace`;
    let tw = ctx.measureText(label).width;

    // Shrink to fit 90% of bbox width
    const maxW = bW * 0.90;
    if (tw + fp*0.9 > maxW) {
      fp = fp * (maxW / (tw + fp*0.9));
      fp = Math.max(fp, 1);
      ctx.font = `${fp}px "Space Mono",monospace`;
      tw = ctx.measureText(label).width;
    }
    // Shrink to fit 65% of bbox height
    const maxH = bH * 0.65;
    if (fp * 1.9 > maxH) {
      fp = maxH / 1.9;
      fp = Math.max(fp, 1);
      ctx.font = `${fp}px "Space Mono",monospace`;
      tw = ctx.measureText(label).width;
    }
    if (fp < 4) return;

    const pad = fp*0.42;
    const pW = tw+pad*2, pH = fp+pad*2;
    const rx = cx-pW/2, ry = cy-pH/2;
    const rr = fp*0.28;

    ctx.fillStyle = 'rgba(10,12,18,0.82)';
    ctx.beginPath(); ctx.roundRect(rx,ry,pW,pH,rr); ctx.fill();

    ctx.strokeStyle = 'rgba(0,229,255,0.45)';
    ctx.lineWidth   = Math.max(0.5, fp*0.07);
    ctx.beginPath(); ctx.roundRect(rx,ry,pW,pH,rr); ctx.stroke();

    ctx.fillStyle = 'rgba(0,229,255,0.95)';
    ctx.fillText(label, cx, cy);
  });
}

// ════════════════════════════════════
//  FIT / ZOOM
// ════════════════════════════════════
function fitToScreen() {
  if (state.activeIdx < 0) return;
  const { bounds } = state.files[state.activeIdx];
  if (!bounds || bounds.w===0) return;
  const pad=50;
  state.zoom = Math.min((canvas.width-pad*2)/bounds.w, (canvas.height-pad*2)/bounds.h, 4);
  state.panX = (canvas.width  - bounds.w*state.zoom)/2;
  state.panY = (canvas.height - bounds.h*state.zoom)/2;
  updateZoomUI(); render();
}
function updateZoomUI() { document.getElementById('zoomLevel').textContent = Math.round(state.zoom*100)+'%'; }

function panToGroup(gIdx) {
  if (state.activeIdx < 0) return;
  const { data, bounds } = state.files[state.activeIdx];
  const g = data.groups[gIdx];
  if (!g) return;
  let [mnX,mnY,mxX,mxY]=[Infinity,Infinity,-Infinity,-Infinity];
  g.outlines.forEach(ol=>ol.segments.forEach(s=>{
    const tr=(x,y)=>g.matrix?applyMat(g.matrix,x,y):{x,y};
    const pts=[];
    if(s.type==='move')   pts.push(tr(s.x,s.y));
    else if(s.type==='line')   pts.push(tr(s.x1,s.y1),tr(s.x2,s.y2));
    else if(s.type==='bezier') pts.push(tr(s.x2,s.y2));
    else if(s.type==='arc')    pts.push(tr(s.x2,s.y2));
    pts.forEach(p=>{if(p.x<mnX)mnX=p.x;if(p.x>mxX)mxX=p.x;if(p.y<mnY)mnY=p.y;if(p.y>mxY)mxY=p.y;});
  }));
  if (!isFinite(mnX)) return;
  const wcx=(mnX+mxX)/2, wcy=(mnY+mxY)/2;
  const wcy_f = bounds.maxY-(wcy-bounds.minY);
  state.panX = canvas.width/2  - (wcx-bounds.minX)*state.zoom;
  state.panY = canvas.height/2 - wcy_f*state.zoom;
  render();
}

// ════════════════════════════════════
//  LOAD
// ════════════════════════════════════
function loadGTK(name, text) {
  const lb = document.getElementById('loadingBar');
  lb.classList.add('active');
  setTimeout(() => {
    const data   = parseGTK(text);
    const bounds = computeBounds(data.groups);
    let pathCount = 0;
    data.groups.forEach(g => pathCount += g.outlines.length);

    const ex = state.files.findIndex(f=>f.name===name);
    const fo = { name, data, bounds, pathCount, groupCount: data.groups.length };
    if (ex>=0){state.files[ex]=fo;state.activeIdx=ex;}
    else{state.files.push(fo);state.activeIdx=state.files.length-1;}

    state.hiddenLayers = new Set();
    empty.classList.add('hidden');
    document.getElementById('saveBtn').disabled = false;

    buildTabs(); buildLayers(); buildShapeList(); updateInfo(); fitToScreen();
    lb.classList.remove('active');
  }, 10);
}

// ════════════════════════════════════
//  SAVE
// ════════════════════════════════════
function saveGTK() {
  if (state.activeIdx < 0) return;
  const file = state.files[state.activeIdx];
  const xml  = serializeGTK(file);
  const blob = new Blob([xml], { type: 'application/xml' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = file.name.replace(/\.gtk$/i,'') + '_edited.gtk';
  a.click();
  URL.revokeObjectURL(url);
  // Mark clean
  file.data.groups.forEach(g => { g.originalName = g.shapeName; });
  updateDirtyBadge();
  buildShapeList();
}

// ════════════════════════════════════
//  UI BUILDERS
// ════════════════════════════════════
function buildTabs() {
  const el = document.getElementById('fileTabs');
  el.innerHTML = '';
  state.files.forEach((f,i) => {
    const tab = document.createElement('div');
    tab.className = 'file-tab'+(i===state.activeIdx?' active':'');
    tab.innerHTML = `<div class="dot"></div>${f.name}`;
    tab.onclick = () => {
      state.activeIdx=i; state.hiddenLayers=new Set();
      buildTabs(); buildLayers(); buildShapeList(); updateInfo(); fitToScreen();
    };
    el.appendChild(tab);
  });
}

function buildLayers() {
  const el = document.getElementById('layerList');
  el.innerHTML = '';
  if (state.activeIdx < 0) return;
  const { data } = state.files[state.activeIdx];
  const counts = {};
  data.groups.forEach(g=>g.outlines.forEach(ol=>{counts[ol.layer]=(counts[ol.layer]||0)+1;}));
  Object.values(data.namedLayers).forEach(layer => {
    const cnt = counts[layer.layer]||0;
    if (!cnt) return;
    const item = document.createElement('div');
    item.className = 'layer-item'+(state.hiddenLayers.has(layer.layer)?' hidden':'');
    const sc = layer.color==='rgb(0,0,0)'?'#e4e8f0':layer.color;
    item.innerHTML = `
      <div class="layer-swatch" style="background:${sc}"></div>
      <div class="layer-name">${layer.name}</div>
      <div class="layer-count">${cnt}</div>
      <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>`;
    item.onclick = () => {
      state.hiddenLayers.has(layer.layer)?state.hiddenLayers.delete(layer.layer):state.hiddenLayers.add(layer.layer);
      buildLayers(); render();
    };
    el.appendChild(item);
  });
}

function buildShapeList() {
  const el = document.getElementById('shapeList');
  el.innerHTML = '';
  if (state.activeIdx < 0) return;
  const { data } = state.files[state.activeIdx];

  data.groups.forEach((g, i) => {
    const dirty = g.shapeName !== g.originalName;
    const row = document.createElement('div');
    row.className = 'shape-item';
    row.id = `sr-${i}`;
    row.innerHTML = `
      <span class="shape-idx">${i+1}</span>
      <input class="shape-name-input${dirty?' dirty':''}" type="text"
             value="${esc(g.shapeName)}" placeholder="(unnamed)" data-idx="${i}">
      <button class="locate-btn" data-idx="${i}" title="Pan to shape">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
        </svg>
      </button>`;

    const inp = row.querySelector('.shape-name-input');
    inp.addEventListener('input', () => {
      data.groups[i].shapeName = inp.value;
      inp.classList.toggle('dirty', inp.value !== data.groups[i].originalName);
      updateDirtyBadge(); render();
    });
    inp.addEventListener('keydown', e => { if(e.key==='Enter') inp.blur(); });

    row.querySelector('.locate-btn').addEventListener('click', () => {
      panToGroup(i);
      canvas.classList.add('do-flash');
      setTimeout(()=>canvas.classList.remove('do-flash'), 1200);
    });

    el.appendChild(row);
  });
  updateDirtyBadge();
}

function updateDirtyBadge() {
  if (state.activeIdx < 0) return;
  const any = state.files[state.activeIdx].data.groups.some(g=>g.shapeName!==g.originalName);
  document.getElementById('dirtyBadge').style.display = any?'inline':'none';
}

function updateInfo() {
  if (state.activeIdx < 0) return;
  const f = state.files[state.activeIdx];
  document.getElementById('iW').textContent  = f.bounds.w.toFixed(1)+' mm';
  document.getElementById('iH').textContent  = f.bounds.h.toFixed(1)+' mm';
  document.getElementById('iP').textContent  = f.pathCount;
  document.getElementById('iG').textContent  = f.groupCount;
  document.getElementById('iFN').textContent = f.name;
}

function toggleLabels() {
  state.showLabels = !state.showLabels;
  document.getElementById('labelTrack').classList.toggle('on', state.showLabels);
  render();
}

function onTextSize(v) {
  state.labelBasePx = +v;
  document.getElementById('sliderVal').textContent = v;
  render();
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ════════════════════════════════════
//  INTERACTIONS
// ════════════════════════════════════
let dragging=false, lastX=0, lastY=0;
wrap.addEventListener('mousedown', e => {
  if (e.target.closest('input,button,a')) return;
  dragging=true; lastX=e.clientX; lastY=e.clientY;
});
window.addEventListener('mouseup',  () => { dragging=false; });
window.addEventListener('mousemove', e => {
  if (dragging) {
    state.panX += e.clientX-lastX; state.panY += e.clientY-lastY;
    lastX=e.clientX; lastY=e.clientY; render();
  }
  const r=canvas.getBoundingClientRect();
  if (state.activeIdx>=0) {
    const {bounds}=state.files[state.activeIdx];
    const wx=(e.clientX-r.left-state.panX)/state.zoom+bounds.minX;
    const wy=bounds.maxY-(e.clientY-r.top-state.panY)/state.zoom;
    document.getElementById('coords').textContent=`x: ${wx.toFixed(2)}  y: ${wy.toFixed(2)}`;
  }
});

wrap.addEventListener('wheel', e => {
  e.preventDefault();
  const r=canvas.getBoundingClientRect();
  const mx=e.clientX-r.left, my=e.clientY-r.top;
  const f=e.deltaY<0?1.12:0.89;
  const nz=Math.max(0.05,Math.min(state.zoom*f,50));
  state.panX=mx-(mx-state.panX)*(nz/state.zoom);
  state.panY=my-(my-state.panY)*(nz/state.zoom);
  state.zoom=nz; updateZoomUI(); render();
},{passive:false});

let lastT=null;
wrap.addEventListener('touchstart',e=>{lastT=[...e.touches];},{passive:true});
wrap.addEventListener('touchmove',e=>{
  e.preventDefault();
  const t=[...e.touches];
  if(t.length===1&&lastT?.length===1){
    state.panX+=t[0].clientX-lastT[0].clientX;
    state.panY+=t[0].clientY-lastT[0].clientY;
    render();
  } else if(t.length===2&&lastT?.length===2){
    const pd=Math.hypot(lastT[0].clientX-lastT[1].clientX,lastT[0].clientY-lastT[1].clientY);
    const nd=Math.hypot(t[0].clientX-t[1].clientX,t[0].clientY-t[1].clientY);
    const mx=(t[0].clientX+t[1].clientX)/2-canvas.getBoundingClientRect().left;
    const my=(t[0].clientY+t[1].clientY)/2-canvas.getBoundingClientRect().top;
    const nz=Math.max(0.05,Math.min(state.zoom*(nd/pd),50));
    state.panX=mx-(mx-state.panX)*(nz/state.zoom);
    state.panY=my-(my-state.panY)*(nz/state.zoom);
    state.zoom=nz; updateZoomUI(); render();
  }
  lastT=t;
},{passive:false});

document.getElementById('zoomIn').onclick  = ()=>{state.zoom=Math.min(state.zoom*1.25,50);updateZoomUI();render();};
document.getElementById('zoomOut').onclick = ()=>{state.zoom=Math.max(state.zoom*0.8,0.05);updateZoomUI();render();};
document.getElementById('fitBtn').onclick  = fitToScreen;

document.getElementById('fileInput').addEventListener('change',e=>{
  [...e.target.files].forEach(f=>{const r=new FileReader();r.onload=ev=>loadGTK(f.name,ev.target.result);r.readAsText(f);});
});

wrap.addEventListener('dragover', e=>{e.preventDefault();wrap.style.outline='2px dashed var(--accent)';});
wrap.addEventListener('dragleave',()=>{wrap.style.outline='';});
wrap.addEventListener('drop',e=>{
  e.preventDefault();wrap.style.outline='';
  [...e.dataTransfer.files].forEach(f=>{
    if(f.name.endsWith('.gtk')){const r=new FileReader();r.onload=ev=>loadGTK(f.name,ev.target.result);r.readAsText(f);}
  });
});

new ResizeObserver(resize).observe(wrap);
resize();
</script>
</body>
</html>
